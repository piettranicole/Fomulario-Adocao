<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário Adoção</title>
    <link rel="stylesheet" href="style.css">
</head>

<header>
    <h1>Adote seu pet!</h1>
</header>

<body>
    <main>
        <h1>Formulário de Adoção</h1>

          <form id="Nome">
            <label for="nome">Nome:</label>
            <input type="text" id="nome" required>

        <form id="formulario">
            <label for="idade">Idade:</label>
            <input type="number" id="idade" required>

            <label for="telefone">Telefone:</label>
            <input type="text" id="telefone" required>

            <label for="cpf">CPF:</label>
            <input type="number" id="cpf" required>

           
           <div>
            <label for="moradia">Tipo de moradia:</label><br>
             <input type="radio" name="moradia" value="casa" required /> Casa
            <input type="radio" name="moradia" value="apartamento" /> Apartamento</br>
        </div>


               <div>
            <label for="quintal">Possui quintal?:</label><br>
           <input type="radio" name="quintal" value="sim" required /> Sim
            <input type="radio" name="quintal" value="nao" /> Não</br>
        </div>

            <label for="pet">Deseja adotar um pet?</label>
            <select id="pet" required>
                <option value="">Selecione</option>
                <option value="sim">Sim</option>
                <option value="nao">Não</option>
            </select>

            <label for="hora">Quantas horas o pet ficará sozinho por dia?</label>
            <input type="number" id="hora" required>

            <label for="mensagem">Motivo da adoção:</label>
            <textarea id="mensagem" rows="3" required></textarea>

            <label for="financeiro">Condição financeira:</label>
            <select id="financeiro" required>
                <option value="">Selecione</option>
                <option value="boa">Boa</option>
                <option value="ruim">Ruim</option>
            </select>

            <label for="decisao">Quando decidiu adotar?</label>
            <select id="decisao" required>
                <option value="">Selecione</option>
                <option value="hoje">Hoje</option>
                <option value="planejado">Planejado</option>
            </select>

            <label>
                <input type="checkbox" id="termo"> Aceito os termos
            </label>

            <button type="submit">Enviar</button>
            
        </form>
    </main>
    
    <script src="script.js"></script>
</body>
</html>
