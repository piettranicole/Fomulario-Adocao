<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário Adoção</title>
    
</head>
<body>
    <main>
        <h1>Formulário de Adoção</h1>

        <form id="formulario">
            <label for="idade">Idade:</label>
            <input type="number" id="idade" required>

            <label for="telefone">Telefone:</label>
            <input type="text" id="telefone" required>

            <label for="cpf">CPF:</label>
            <input type="text" id="cpf" required>

            <label for="moradia">Tipo de Moradia:</label>
            <select id="moradia" required>
                <option value="">Selecione</option>
                <option value="apartamento">Apartamento</option>
                <option value="casa">Casa</option>
            </select>

            <div id="apartamentoDiv" class="hidden">
                <label for="permiteAnimais">Apartamento permite animais?</label>
                <select id="permiteAnimais">
                    <option value="">Selecione</option>
                    <option value="sim">Sim</option>
                    <option value="nao">Não</option>
                </select>
            </div>

            <div id="casaDiv" class="hidden">
                <label for="possuiQuintal">Possui quintal?</label>
                <select id="possuiQuintal">
                    <option value="">Selecione</option>
                    <option value="sim">Sim</option>
                    <option value="nao">Não</option>
                </select>

                <div id="quintalSeguroDiv" class="hidden">
                    <label for="quintalSeguro">O quintal é seguro?</label>
                    <select id="quintalSeguro">
                        <option value="">Selecione</option>
                        <option value="sim">Sim</option>
                        <option value="nao">Não</option>
                    </select>
                </div>
            </div>

            <label for="pet">Deseja adotar um pet?</label>
            <select id="pet" required>
                <option value="">Selecione</option>
                <option value="sim">Sim</option>
                <option value="nao">Não</option>
            </select>

            <label for="hora">Quantas horas o pet ficará sozinho por dia?</label>
            <input type="number" id="hora" required>

            <label for="mensagem">Motivo da adoção:</label>
            <textarea id="mensagem" rows="3" required></textarea>

            <label for="financeiro">Condição financeira:</label>
            <select id="financeiro" required>
                <option value="">Selecione</option>
                <option value="boa">Boa</option>
                <option value="ruim">Ruim</option>
            </select>

            <label for="decisao">Quando decidiu adotar?</label>
            <select id="decisao" required>
                <option value="">Selecione</option>
                <option value="hoje">Hoje</option>
                <option value="planejado">Planejado</option>
            </select>

            <label>
                <input type="checkbox" id="termo"> Aceito os termos
            </label>

            <button type="submit">Enviar</button>
            
        </form>
    </main>

</body>
</html>
